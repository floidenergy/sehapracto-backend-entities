name: Backend-entity Package

on: 
  push:
    branches:
      - main

jobs:
  publish-gpr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v1
        with:
          node-version: 12
          registry-url: https://npm.pkg.github.com/
          scope: '@sehapracto'
      - run: npm install
      - run: npm publish
        env:
          NODE_AUTH_TOKE: ${{secrets.ORGANIZATION_TOKEN}}
